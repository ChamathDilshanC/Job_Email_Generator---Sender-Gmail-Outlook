name: Release

# Cut a release by pushing a tag: git tag vX.Y.Z && git push origin vX.Y.Z
# This workflow then auto-creates the GitHub Release with generated notes.
# Deployment itself is handled separately by Vercel's own GitHub integration.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
